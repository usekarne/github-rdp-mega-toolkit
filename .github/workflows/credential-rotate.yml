name: "Credential Rotate v9.0"

on:
  workflow_dispatch:
    inputs:
      username:
        description: "RDP username (default runner)"
        required: false
        default: "runner"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  actions: write

env:
  TUNNEL_PROVIDERS: "serveo,localhost.run,cloudflare"
  RDP_USERNAME: ${{ github.event.inputs.username || 'runner' }}

jobs:
  credential-rotate:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate rotated password artifact
        shell: pwsh
        run: |
          pwsh .\core\powershell\rotate-password.ps1 -Username $env:RDP_USERNAME -OutputPath rotated-password.txt
          Write-Host "Rotated password generated for user $env:RDP_USERNAME"
          # Mirror to standard credential filenames expected by other workflows
          Copy-Item rotated-password.txt rdp-password.txt -Force
          $env:RDP_USERNAME | Out-File -Encoding ASCII -NoNewline -FilePath RDP_USERNAME.txt
          Copy-Item rotated-password.txt RDP_PASSWORD.txt -Force

      - name: Upload rotated credential artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rotated-credentials-${{ github.run_id }}
          path: |
            rotated-password.txt
            rdp-password.txt
            RDP_USERNAME.txt
            RDP_PASSWORD.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Force rotated-password.txt, rdp-password.txt, RDP_USERNAME.txt, RDP_PASSWORD.txt -ErrorAction SilentlyContinue
          Write-Host "Credential rotation complete."
