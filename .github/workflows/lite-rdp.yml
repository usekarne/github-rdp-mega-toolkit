name: "Lite RDP v9.0 (6hr)"

on:
  workflow_dispatch:
    inputs:
      optimize_profile:
        description: "Optimization profile"
        required: false
        type: choice
        options:
          - productivity
          - gaming
          - minimal
        default: productivity
      install_software:
        description: "Install software list?"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

jobs:
  lite-rdp:
    runs-on: windows-latest
    timeout-minutes: 375
    env:
      RDP_MASTER_PASSWORD: ${{ secrets.RDP_MASTER_PASSWORD }}
      TUNNEL_PROVIDERS: "serveo,localhost.run,cloudflare"
      OPTIMIZE_PROFILE: ${{ inputs.optimize_profile }}
      SESSION_HOURS: "6"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup RDP"
        shell: pwsh
        run: |
          . .\rdp_toolkit\core_ps\utils.ps1
          .\rdp_toolkit\core_ps\setup-rdp.ps1

      - name: "Optimize Windows"
        shell: pwsh
        run: |
          . .\rdp_toolkit\core_ps\utils.ps1
          .\rdp_toolkit\core_ps\optimize-windows.ps1

      - name: "Install Software"
        if: ${{ inputs.install_software }}
        shell: pwsh
        run: |
          . .\rdp_toolkit\core_ps\utils.ps1
          .\rdp_toolkit\core_ps\install-software.ps1

      - name: "Setup Tunnel (serveo -> localhost.run -> cloudflare)"
        shell: pwsh
        run: |
          . .\rdp_toolkit\core_ps\utils.ps1
          .\rdp_toolkit\core_ps\setup-tunnel.ps1

      - name: "Upload Credentials"
        uses: actions/upload-artifact@v4
        with:
          name: rdp-credentials
          path: rdp-artifacts/
          retention-days: 1
          if-no-files-found: warn

      - name: "Keep Alive 6 Hours"
        shell: pwsh
        run: |
          . .\rdp_toolkit\core_ps\utils.ps1
          .\rdp_toolkit\core_ps\keepalive.ps1

      - name: "Cleanup"
        if: always()
        shell: pwsh
        run: |
          . .\rdp_toolkit\core_ps\utils.ps1
          .\rdp_toolkit\core_ps\cleanup.ps1
