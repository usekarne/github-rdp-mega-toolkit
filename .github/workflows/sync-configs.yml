name: "Sync Configs v9.0"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "configs/**"

permissions:
  contents: read
  actions: write

env:
  TUNNEL_PROVIDERS: "serveo,localhost.run,cloudflare"

jobs:
  validate-configs:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: Validate all JSON configs and report
        shell: bash
        run: |
          set -euo pipefail
          REPORT="config-validation-report.md"
          {
            echo "# Config Validation Report"
            echo ""
            echo "Timestamp: $(date -u)"
            echo ""
            echo "## JSON Files"
          } > "$REPORT"

          FAILED=0
          for f in configs/*.json; do
            if [ -f "$f" ]; then
              if python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"; then
                echo "- PASS: $f" >> "$REPORT"
              else
                echo "- FAIL: $f" >> "$REPORT"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          {
            echo ""
            echo "## YAML Files"
          } >> "$REPORT"
          for f in configs/*.yml configs/*.yaml; do
            if [ -f "$f" ]; then
              if python3 -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" "$f"; then
                echo "- PASS: $f" >> "$REPORT"
              else
                echo "- FAIL: $f" >> "$REPORT"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          {
            echo ""
            echo "## Summary"
            echo "Failed files: $FAILED"
          } >> "$REPORT"

          cat "$REPORT"
          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-validation-${{ github.run_id }}
          path: config-validation-report.md
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f config-validation-report.md
          echo "Sync configs workflow complete."
