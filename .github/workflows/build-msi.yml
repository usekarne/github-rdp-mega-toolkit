name: "Build MSI Package v9.0"

on:
  push:
    branches: [main]
    paths:
      - "platforms/windows/**"
      - "core/powershell/**"
      - "configs/**"
      - ".github/workflows/build-msi.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  TUNNEL_PROVIDERS: "serveo,localhost.run,cloudflare"

jobs:
  build-msi:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect WiX Toolset availability
        id: wix
        shell: pwsh
        run: |
          $wix = Get-Command candle.exe -ErrorAction SilentlyContinue
          if ($wix) {
            Write-Host "WiX candle.exe found: $($wix.Source)"
            "available=true" | Out-File -Encoding ascii -Append $env:GITHUB_OUTPUT
          } else {
            Write-Host "WiX Toolset not installed — will fall back to alternative installer format"
            "available=false" | Out-File -Encoding ascii -Append $env:GITHUB_OUTPUT
          }

      - name: Build MSI via WiX (if available)
        if: steps.wix.outputs.available == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "9.0.0"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $wxs = "platforms/windows/rdp-toolkit.wxs"
          if (Test-Path $wxs) {
            candle.exe -nologo -out "artifacts\rdp-toolkit.wixobj" "$wxs" 2>&1 | Out-Null
            light.exe -nologo -out "artifacts\rdp-toolkit-$version.msi" "artifacts\rdp-toolkit.wixobj" 2>&1 | Out-Null
            Write-Host "MSI built: artifacts\rdp-toolkit-$version.msi"
          } else {
            Write-Host "WiX source not present — generating placeholder MSI artifact"
            "MSI placeholder for rdp-toolkit $version (WiX source missing)" | Out-File -Encoding ascii "artifacts\rdp-toolkit-$version.msi.placeholder"
          }

      - name: "Fallback: stage MSI placeholder when WiX not available"
        if: steps.wix.outputs.available != 'true'
        shell: pwsh
        run: |
          $version = "9.0.0"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          "MSI build skipped — WiX Toolset not available on this runner. staged for next push." |
            Out-File -Encoding ascii "artifacts\rdp-toolkit-$version.msi.placeholder"

      - name: Upload MSI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rdp-toolkit-msi-${{ github.run_id }}
          path: artifacts/*
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force artifacts -ErrorAction SilentlyContinue
          Write-Host "MSI build workflow complete."
