  - DocumentLabel: Tunnels Guide
    DocumentUrl: https://github.com/usekarne/github-rdp-mega-toolkit/blob/main/docs/TUNNELS.md
  - DocumentLabel: Security Notes
    DocumentUrl: https://github.com/usekarne/github-rdp-mega-toolkit/blob/main/docs/SECURITY.md
ManifestType: merged
ManifestVersion: 1.5.0

Installers:
