PackageIdentifier: usekarne.GitHubRDPMegaToolkit
PackageVersion: 9.0.0
PackageLocale: en-US
Publisher: usekarne
PublisherUrl: https://github.com/usekarne
PublisherSupportUrl: https://github.com/usekarne/github-rdp-mega-toolkit/issues
PrivacyUrl: https://github.com/usekarne/github-rdp-mega-toolkit/blob/main/docs/SECURITY.md
Author: usekarne
PackageName: GitHub RDP Mega Toolkit
PackageUrl: https://github.com/usekarne/github-rdp-mega-toolkit
License: MIT
LicenseUrl: https://raw.githubusercontent.com/usekarne/github-rdp-mega-toolkit/main/LICENSE
Copyright: Copyright (c) 2024 usekarne
CopyrightUrl: https://raw.githubusercontent.com/usekarne/github-rdp-mega-toolkit/main/LICENSE
ShortDescription: Cross-platform RDP automation toolkit for GitHub Actions runners (Windows client).
Description: |
  The GitHub RDP Mega Toolkit automates bringing up an RDP-capable environment
  on GitHub Actions runners and connecting to it from a Windows client using
  mstsc.exe or xfreerdp.

  Tunnels supported: Serveo (primary), localhost.run (secondary), Cloudflare
  (fallback). No ngrok dependency.

  The Windows installer:
    * Installs to %ProgramFiles%\GitHubRDPToolkit
    * Adds install dir to PATH
    * Creates Start Menu + Desktop shortcuts
    * Registers an uninstaller visible in Add/Remove Programs
    * Optionally downloads and installs cloudflared.exe for Cloudflare fallback
Moniker: github-rdp-mega-toolkit
Tags:
  - rdp
  - github-actions
  - cloudflared
  - mstsc
  - xfreerdp
  - remote-desktop
  - tunnel
  - serveo
  - cross-platform
  - admin
ReleaseNotes: |
  v9.0.0 (MEGA rewrite):
    * Multi-agent rewrite with cross-platform support (Kali/Windows/Android)
    * Pure PowerShell fetch-creds (no Python dependency on client)
    * Added WiX MSI build pipeline and Chocolatey/Scoop/Winget manifests
    * Reversible registry edits; full uninstall path
ReleaseNotesUrl: https://github.com/usekarne/github-rdp-mega-toolkit/releases/tag/v9.0.0
PurchaseUrl: null
InstallationNotes: |
  After install, open a NEW terminal then run 'rdp-toolkit doctor' to verify
  the environment. To use Cloudflare fallback, install cloudflared.exe
  separately (winget install Cloudflare.cloudflared) or pass
  -InstallCloudflared to the bundled install.ps1.
Documentations:
